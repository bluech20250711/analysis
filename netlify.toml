[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Netlify Functions 번들러는 기본적으로 정적 import된 JS/TS만 패키징하고
# templates/ 아래의 XML/폰트 같은 비-코드 자산은 자동으로 포함하지 않는다.
# export-hwpx는 templates/hwpx-template/(section0.xml 등), export-pdf는
# templates/pdf-template/(한글 서브셋 폰트)를 런타임에 fs로 직접 읽으므로
# 각 함수 배포 패키지에 명시적으로 포함시켜야 한다. (ENOENT: stat '/var/task/templates/...' 방지)
[functions."export-hwpx"]
  included_files = ["templates/hwpx-template/**"]

[functions."export-pdf"]
  included_files = ["templates/pdf-template/**"]

# ffmpeg-static은 실행 파일(바이너리)을 npm install 시점에 node_modules/ffmpeg-static/
# 폴더 안(index.js 바로 옆)에 직접 내려받는다(ffmpeg-static/index.js가 path.join(__dirname,
# 'ffmpeg')로 그 위치를 계산). esbuild가 이 패키지를 다른 코드처럼 인라인/번들링하려고 하면
# __dirname 기준 상대 위치가 깨지거나 바이너리 자체가 배포 패키지에서 통째로 누락될 수 있다
# (실제로 "ffmpeg 바이너리 경로를 찾을 수 없습니다" 에러로 발견 — npm install 자체는
# 성공했는데도 함수 실행 시점에는 못 찾는 증상과 일치). external_node_modules로 지정하면
# 번들링/트리쉐이킹 없이 node_modules/ffmpeg-static 폴더 전체(JS + 바이너리)를 원본 그대로
# 배포 패키지에 복사해 이 문제를 근본적으로 없앤다.
[functions."merge-audio-background"]
  external_node_modules = ["ffmpeg-static"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
